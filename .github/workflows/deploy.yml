name: Deploy VigiSwap to Cloudflare Pages

# Auto-deploy on every push to main. Also runnable manually.
# NOTE: GitHub Actions minutes require billing — this workflow stays configured
# and will run automatically once billing is available. Until then, deploy
# manually:  npm run build && npx wrangler pages deploy out --project-name vigiswap --branch main
on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      deployments: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install dependencies
        run: npm install --legacy-peer-deps --no-audit --no-fund

      - name: Build (static export)
        run: npm run build

      - name: Deploy to Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy out --project-name=vigiswap --branch=main
